<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Staff Dashboard | Item Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body {
            background: radial-gradient(circle at 10% 20%, #0f192d 0%, #050c18 100%);
            min-height: 100vh;
            padding: 1rem;
        }
        .glass-card {
            background: rgba(18, 28, 45, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .top-bar {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(120deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .search-box {
            background: rgba(0,0,0,0.4);
            border-radius: 3rem;
            padding: 0.3rem 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
        }
        .search-box input {
            background: transparent;
            border: none;
            padding: 8px 0;
            color: white;
            width: 220px;
            outline: none;
        }
        .secret-toggle {
            background: rgba(0,0,0,0.6);
            border: 1px solid #fbbf24;
            border-radius: 2rem;
            padding: 4px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            color: #fbbf24;
            display: none;
            white-space: nowrap;
        }
        .secret-toggle.visible { display: inline-flex; align-items: center; gap: 4px; }
        .filter-bar {
            background: rgba(18, 28, 45, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 0.7rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1.5rem;
            align-items: center;
        }
        .filter-pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 3rem;
            padding: 6px 20px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #cbd5e1;
            cursor: pointer;
        }
        .filter-pill.active {
            background: #2563eb;
            border-color: #3b82f6;
            color: white;
        }
        .sort-select {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2rem;
            padding: 6px 12px;
            color: #e2e8f0;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .stats-badge {
            background: rgba(37,99,235,0.3);
            border-radius: 2rem;
            padding: 5px 14px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #a5f3fc;
            margin-left: auto;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }
        .item-card {
            background: rgba(20, 30, 55, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            border: 1px solid rgba(255,255,255,0.12);
            overflow: hidden;
            transition: 0.2s;
        }
        .item-card:hover { transform: translateY(-4px); border-color: rgba(96,165,250,0.4); }
        .item-img-section {
            height: 160px;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .item-img {
            max-width: 100%;
            max-height: 140px;
            object-fit: contain;
            cursor: pointer;
            border-radius: 8px;
        }
        .no-img {
            color: #6c7a91;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .item-content { padding: 1rem; }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
            gap: 8px;
        }
        .item-name {
            font-weight: 700;
            font-size: 1rem;
            color: white;
            word-break: break-word;
        }
        .order-ref {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.5);
            padding: 3px 8px;
            border-radius: 20px;
            color: #9ca3af;
        }
        .item-details {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0;
            font-size: 0.75rem;
            color: #cbd5e6;
        }
        .detail-badge {
            background: rgba(255,255,255,0.05);
            border-radius: 1rem;
            padding: 4px 10px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .customer-info {
            font-size: 0.7rem;
            color: #a0aec0;
            margin: 8px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 8px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .item-actions {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        .btn-icon {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2rem;
            padding: 6px 12px;
            font-size: 0.7rem;
            cursor: pointer;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.15); }
        .amount-input {
            background: rgba(0,0,0,0.6);
            border: 1px solid #3b82f6;
            border-radius: 2rem;
            padding: 6px 12px;
            width: 100px;
            color: white;
            font-size: 0.8rem;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            z-index: 2000;
            opacity: 0;
            transition: 0.2s;
        }
        .toast.show { opacity: 1; }
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .lightbox img {
            max-width: 85%;
            max-height: 85%;
            border-radius: 24px;
        }
        @media (max-width: 700px) {
            .items-grid { grid-template-columns: 1fr; }
            .top-bar { flex-direction: column; align-items: stretch; }
            .search-box input { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginPanel" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="glass-card" style="max-width: 400px; text-align: center;">
            <div style="font-size: 3rem; color: #60a5fa;"><i class="fas fa-user-shield"></i></div>
            <h2 style="color: white; margin: 1rem 0;">Staff Login</h2>
            <input type="email" id="staffEmail" placeholder="Email" style="width:100%; margin-bottom: 1rem; padding: 10px; border-radius: 2rem; background: rgba(0,0,0,0.4); color: white; border: 1px solid rgba(255,255,255,0.2);">
            <input type="password" id="staffPassword" placeholder="Password" style="width:100%; margin-bottom: 1rem; padding: 10px; border-radius: 2rem; background: rgba(0,0,0,0.4); color: white; border: 1px solid rgba(255,255,255,0.2);">
            <button id="loginBtn" style="background: #2563eb; width:100%; padding: 10px; border-radius: 2rem; color: white; font-weight: bold;">Login</button>
            <div id="loginError" style="color: #f87171; margin-top: 1rem; display: none;"></div>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="staffDashboard" style="display: none; max-width: 1600px; margin: 0 auto; padding: 1rem;">
        <div class="top-bar">
            <div class="brand"><i class="fas fa-cubes"></i> ItemFlow · Staff</div>
            <div style="display: flex; gap: 12px;">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Item / Order / Customer / Phone">
                    <button id="secretToggleBtn" class="secret-toggle">💰 Reveal Amounts</button>
                </div>
                <button id="logoutBtn" class="btn-icon"><i class="fas fa-sign-out-alt"></i> Exit</button>
            </div>
        </div>

        <div class="filter-bar">
            <button data-filter="all" class="filter-pill active">📦 All</button>
            <button data-filter="Pending" class="filter-pill">⏳ Pending</button>
            <button data-filter="In Progress" class="filter-pill">⚙️ In Progress</button>
            <button data-filter="Completed" class="filter-pill">✅ Completed</button>
            <button data-filter="Delivered" class="filter-pill">🚚 Delivered</button>
            <button data-filter="Paid" class="filter-pill">💰 Paid</button>
            <select id="sortSelect" class="sort-select">
                <option value="newest">📅 Latest first</option>
                <option value="oldest">📅 Oldest first</option>
            </select>
            <div class="stats-badge" id="itemCounter">0 items</div>
        </div>

        <div id="itemsContainer" class="items-grid">
            <div class="glass-card" style="text-align: center;">Loading items...</div>
        </div>
    </div>

    <div id="toastMsg" class="toast"></div>
    <div id="lightboxModal" class="lightbox" onclick="closeLightbox()">
        <img id="lightboxImage" src="">
        <div style="position: absolute; top: 20px; right: 30px; font-size: 2rem; color:white; cursor:pointer;">&times;</div>
    </div>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2IfsBsyBWSx415yaFajLoy_32dAb_J2Q",
            authDomain: "order-tracker-e7ee9.firebaseapp.com",
            projectId: "order-tracker-e7ee9",
            storageBucket: "order-tracker-e7ee9.firebasestorage.app",
            messagingSenderId: "1050523392217",
            appId: "1:1050523392217:web:3129fe24e7c28c1311c6c8"
        };
        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM elements
        const loginPanel = document.getElementById('loginPanel');
        const dashboard = document.getElementById('staffDashboard');
        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('staffEmail');
        const pwdInput = document.getElementById('staffPassword');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');
        const searchInput = document.getElementById('searchInput');
        const secretToggleBtn = document.getElementById('secretToggleBtn');
        const itemsContainer = document.getElementById('itemsContainer');
        const itemCounterSpan = document.getElementById('itemCounter');
        const sortSelect = document.getElementById('sortSelect');

        let allOrders = [], allCustomers = [], flatItems = [], currentFilter = 'all', searchTerm = '', uid = null;
        let showAmounts = false; // hidden by default

        // Helper: remove secret word from search term for filtering
        function getEffectiveSearchTerm(rawTerm) {
            if (!rawTerm) return '';
            // Remove the secret word "bhav" (case-insensitive) from the term
            let term = rawTerm.toLowerCase();
            const secretWord = 'bhav';
            if (term.includes(secretWord)) {
                term = term.replace(new RegExp(secretWord, 'gi'), '').trim();
            }
            return term;
        }

        function updateSecretButtonVisibility() {
            const rawTerm = searchInput.value.toLowerCase();
            if (rawTerm.includes('bhav')) {
                secretToggleBtn.classList.add('visible');
            } else {
                secretToggleBtn.classList.remove('visible');
                // If secret word disappears, also hide amounts (security)
                if (showAmounts) {
                    showAmounts = false;
                    renderItems();
                }
            }
        }

        // Toggle amounts when secret button clicked
        secretToggleBtn.addEventListener('click', () => {
            showAmounts = !showAmounts;
            renderItems();
        });

        function showToast(msg, isErr = false) {
            const toast = document.getElementById('toastMsg');
            toast.textContent = msg;
            toast.style.background = isErr ? 'rgba(180,30,30,0.9)' : 'rgba(0,0,0,0.85)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function updateItemStatus(orderId, itemIndex, newStatus) {
            if (!uid) return;
            try {
                const order = allOrders.find(o => o.id === orderId);
                if (!order || !order.items[itemIndex]) return;
                const updatedItems = [...order.items];
                updatedItems[itemIndex] = { ...updatedItems[itemIndex], status: newStatus };
                const orderRef = doc(db, 'users', uid, 'orders', orderId.toString());
                await setDoc(orderRef, { ...order, items: updatedItems, updatedAt: new Date().toISOString() }, { merge: true });
                showToast(`Item status → ${newStatus}`);
            } catch (err) { showToast("Update failed", true); }
        }

        async function updateItemAmount(orderId, itemIndex, amount) {
            if (!uid) return;
            try {
                const order = allOrders.find(o => o.id === orderId);
                if (!order || !order.items[itemIndex]) return;
                const updatedItems = [...order.items];
                updatedItems[itemIndex] = { ...updatedItems[itemIndex], amount: parseFloat(amount) || 0 };
                const orderRef = doc(db, 'users', uid, 'orders', orderId.toString());
                await setDoc(orderRef, { ...order, items: updatedItems, updatedAt: new Date().toISOString() }, { merge: true });
                showToast(`Amount updated: ₹${amount}`);
            } catch (err) { showToast("Update failed", true); }
        }

        function rebuildFlatItems() {
            const items = [];
            for (const order of allOrders) {
                if (!order.items) continue;
                const customer = allCustomers.find(c => c.id === order.customerId) || { name: order.customerName || 'Unknown', phone: order.customerPhone || '' };
                order.items.forEach((item, idx) => {
                    items.push({
                        id: `${order.id}_${idx}`,
                        orderId: order.orderId,
                        orderDate: order.date,
                        dueDate: order.dueDate,
                        orderStatus: order.status,
                        customerName: customer.name,
                        customerPhone: customer.phone,
                        totalValue: order.totalValue,
                        paidAmount: order.paidAmount,
                        description: order.description,
                        item: { ...item, index: idx, amount: item.amount || 0 },
                        originalOrderId: order.id,
                        sortTimestamp: new Date(order.date || 0).getTime()
                    });
                });
            }
            flatItems = items;
        }

        function filterAndSortItems() {
            let filtered = [...flatItems];
            if (currentFilter !== 'all') filtered = filtered.filter(fi => fi.item.status === currentFilter);
            
            // Get effective search term (secret word removed)
            const effectiveTerm = getEffectiveSearchTerm(searchTerm);
            if (effectiveTerm) {
                const term = effectiveTerm.toLowerCase();
                filtered = filtered.filter(fi => 
                    fi.item.name?.toLowerCase().includes(term) || 
                    fi.orderId?.toLowerCase().includes(term) || 
                    fi.customerName?.toLowerCase().includes(term) ||
                    (fi.customerPhone && fi.customerPhone.toLowerCase().includes(term))
                );
            }
            
            const sortOrder = sortSelect.value;
            filtered.sort((a, b) => sortOrder === 'newest' ? b.sortTimestamp - a.sortTimestamp : a.sortTimestamp - b.sortTimestamp);
            return filtered;
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

        function renderItems() {
            const filtered = filterAndSortItems();
            itemCounterSpan.innerText = `${filtered.length} item${filtered.length !== 1 ? 's' : ''}`;
            if (filtered.length === 0) {
                itemsContainer.innerHTML = '<div class="glass-card" style="text-align: center;">No items match.</div>';
                return;
            }

            itemsContainer.innerHTML = filtered.map(fi => {
                const item = fi.item;
                const orderId = fi.orderId;
                const custName = fi.customerName;
                const due = fi.dueDate ? new Date(fi.dueDate).toLocaleDateString() : null;
                const overdue = due && fi.dueDate && !['Delivered','Paid','Cancelled'].includes(fi.orderStatus) && (new Date(fi.dueDate) < new Date());
                const imageSrc = item.image && item.image.trim() !== '' ? item.image : null;

                const amount = item.amount || 0;
                const amountHtml = showAmounts ? `
                    <div class="detail-badge">
                        <i class="fas fa-rupee-sign"></i> Amt: ₹${amount.toFixed(2)}
                    </div>
                ` : '';

                let amountControlHtml = '';
                if (showAmounts) {
                    amountControlHtml = `
                        <div style="display: flex; gap: 6px; align-items: center; margin-top: 6px;">
                            <input type="number" id="amount-input-${fi.id}" class="amount-input" placeholder="Amount" value="${amount || ''}" step="0.01">
                            <button class="btn-icon save-amount-btn" data-order="${fi.originalOrderId}" data-idx="${item.index}" style="padding: 4px 12px;">Save</button>
                        </div>
                    `;
                }

                return `
                    <div class="item-card">
                        <div class="item-img-section">
                            ${imageSrc ? `<img src="${imageSrc}" class="item-img" onclick="window.openLightbox('${imageSrc.replace(/'/g, "\\'")}')" loading="lazy">` : 
                                `<div class="no-img"><i class="fas fa-image" style="font-size:2rem; opacity:0.5"></i><span>No image</span></div>`}
                        </div>
                        <div class="item-content">
                            <div class="item-header">
                                <div class="item-name">${escapeHtml(item.name)}</div>
                                <div class="order-ref">#${escapeHtml(orderId)}</div>
                            </div>
                            <div class="item-details">
                                <span class="detail-badge"><i class="fas fa-cubes"></i> ${item.qty || 1}</span>
                                ${item.printType ? `<span class="detail-badge"><i class="fas fa-print"></i> ${escapeHtml(item.printType)}</span>` : ''}
                                ${item.material ? `<span class="detail-badge"><i class="fas fa-layer-group"></i> ${escapeHtml(item.material)}</span>` : ''}
                                ${item.finishing ? `<span class="detail-badge"><i class="fas fa-sparkles"></i> ${escapeHtml(item.finishing)}</span>` : ''}
                                ${amountHtml}
                            </div>
                            ${item.description ? `<div style="font-size:0.7rem; color:#b9c7d9; margin: 6px 0;">📝 ${escapeHtml(item.description)}</div>` : ''}
                            <div class="customer-info">
                                <span><i class="fas fa-user"></i> ${escapeHtml(custName)}</span>
                                <span><i class="fas fa-phone"></i> ${fi.customerPhone || '—'}</span>
                                ${due ? `<span style="color:${overdue ? '#f97316' : '#9ca3af'}"><i class="far fa-calendar"></i> Due: ${due}</span>` : ''}
                            </div>
                            <div class="item-actions">
                                <select class="status-select" data-order="${fi.originalOrderId}" data-idx="${item.index}" style="background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 2rem; padding: 6px 12px; color: white;">
                                    <option value="Pending" ${item.status === 'Pending' ? 'selected' : ''}>⏳ Pending</option>
                                    <option value="In Progress" ${item.status === 'In Progress' ? 'selected' : ''}>⚙️ In Progress</option>
                                    <option value="Completed" ${item.status === 'Completed' ? 'selected' : ''}>✅ Completed</option>
                                    <option value="Delivered" ${item.status === 'Delivered' ? 'selected' : ''}>🚚 Delivered</option>
                                    <option value="Paid" ${item.status === 'Paid' ? 'selected' : ''}>💰 Paid</option>
                                    <option value="Cancelled" ${item.status === 'Cancelled' ? 'selected' : ''}>❌ Cancelled</option>
                                </select>
                                <button class="btn-icon mark-paid-btn" data-order="${fi.originalOrderId}" data-idx="${item.index}"><i class="fas fa-check-circle"></i> Mark Paid</button>
                            </div>
                            ${amountControlHtml}
                        </div>
                    </div>
                `;
            }).join('');

            // Attach event listeners
            document.querySelectorAll('.status-select').forEach(sel => {
                sel.addEventListener('change', (e) => {
                    const orderId = sel.dataset.order;
                    const idx = parseInt(sel.dataset.idx);
                    const newStatus = sel.value;
                    updateItemStatus(orderId, idx, newStatus);
                });
            });
            document.querySelectorAll('.mark-paid-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const orderId = btn.dataset.order;
                    const idx = parseInt(btn.dataset.idx);
                    updateItemStatus(orderId, idx, 'Paid');
                });
            });
            document.querySelectorAll('.save-amount-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const orderId = btn.dataset.order;
                    const idx = parseInt(btn.dataset.idx);
                    const input = document.getElementById(`amount-input-${flatItems.find(f => f.originalOrderId === orderId && f.item.index === idx)?.id}`);
                    if (input) {
                        const amount = parseFloat(input.value);
                        if (!isNaN(amount)) {
                            updateItemAmount(orderId, idx, amount);
                        } else {
                            showToast("Invalid amount", true);
                        }
                    }
                });
            });
        }

        window.openLightbox = (src) => {
            document.getElementById('lightboxImage').src = src;
            document.getElementById('lightboxModal').style.display = 'flex';
        };
        window.closeLightbox = () => {
            document.getElementById('lightboxModal').style.display = 'none';
        };

        function startListeners(userUid) {
            uid = userUid;
            onSnapshot(collection(db, 'users', uid, 'customers'), snap => {
                allCustomers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                rebuildFlatItems();
                renderItems();
            });
            onSnapshot(query(collection(db, 'users', uid, 'orders')), snap => {
                allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                rebuildFlatItems();
                renderItems();
            });
        }

        loginBtn.onclick = async () => {
            const email = emailInput.value.trim();
            const pass = pwdInput.value;
            if (!email || !pass) {
                loginError.innerText = "Enter email & password";
                loginError.style.display = 'block';
                return;
            }
            loginError.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Signing...';
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                loginError.innerText = "Invalid credentials";
                loginError.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login';
            }
        };

        logoutBtn.onclick = async () => {
            await signOut(auth);
            showToast("Logged out");
        };

        document.querySelectorAll('.filter-pill').forEach(btn => btn.onclick = () => {
            document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            renderItems();
        });
        sortSelect.onchange = () => renderItems();
        searchInput.oninput = (e) => { 
            searchTerm = e.target.value; 
            updateSecretButtonVisibility();
            renderItems(); 
        };

        // Initial check
        updateSecretButtonVisibility();

        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                loginPanel.style.display = 'none';
                dashboard.style.display = 'block';
                startListeners(user.uid);
                currentFilter = 'all';
                searchTerm = '';
                searchInput.value = '';
                sortSelect.value = 'newest';
                updateSecretButtonVisibility();
                document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                const allBtn = document.querySelector('.filter-pill[data-filter="all"]');
                if(allBtn) allBtn.classList.add('active');
                showToast(`Welcome, ${user.email}`);
            } else {
                loginPanel.style.display = 'flex';
                dashboard.style.display = 'none';
                uid = null;
                flatItems = [];
                allOrders = [];
                allCustomers = [];
                if(loginBtn) {
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Login';
                }
                emailInput.value = '';
                pwdInput.value = '';
                loginError.style.display = 'none';
            }
        });
    </script>
</body>
</html>
